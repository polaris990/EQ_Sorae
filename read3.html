<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <title>Look After</title>
    <link rel="icon" href="Image.1/LOGO0.png">
    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: #ffffff;
    color: #858585;
}

/* Header */
.header {
    border-bottom: 1px solid #eee;
    padding: 20px 0;
}

.container {
    max-width: 1200px;
    margin: auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo {
    font-size: 22px;
    font-weight: 600;
}

nav a {
    text-decoration: none;
    color: #555;
    margin-left: 20px;
}

nav a:hover {
    color: #646464;
}

 /* ////////////////////////////// Webtoon List //////////////////////// */
.webtoon-list {
    max-width: 1200px;
    margin: 60px auto;
    padding: 0 20px;
}

.webtoon-list h2 {
    margin-bottom: 30px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 25px;
}

.card {
    background: #fafafa;
    border-radius: 10px;
    overflow: hidden;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

.card img {
    width: 100%;
    display: block;
}

.card h3 {
    padding: 15px 15px 5px;
    font-size: 16px;
}

.card p {
    padding: 0 15px 15px;
    color: #686666;
    font-size: 14px;
}

/* Reader */
.reader-header {
    text-align: center;
    padding: 20px;
    border-bottom: 1px solid #eee;
}

.reader-header a {
    position: absolute;
    left: 20px;
    text-decoration: none;
    color: rgb(124, 124, 124);
}

.reader-container {
    max-width: 800px;
    margin: 40px auto;
}

.reader-container img {
    width: 100%;
    margin-bottom: 15px;
}

.reader-footer {
    text-align: center;
    padding: 40px 0;
}

.reader-footer button {
    padding: 10px 25px;
    border: none;
    background: #161616;
    color: #fff;
    border-radius: 6px;
    cursor: pointer;
}

.reader-footer button:hover {
    background: #dad7d7;
    color: rgb(92, 92, 92);

}

    </style>
</head>
